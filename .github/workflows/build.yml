name: Build

on:
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild every app in the registry'
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    name: Discover matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      empty: ${{ steps.matrix.outputs.empty }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install Lix
        uses: canidae-solutions/lix-quick-install-action@main

      - name: Check for cache token
        id: cache
        env:
          CACHE_TOKEN: ${{ secrets.FLOE_CACHE_TOKEN }}
        run: |
          if [[ -n "${CACHE_TOKEN:-}" ]]; then
            echo "have_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Attic
        if: steps.cache.outputs.have_token == 'true'
        env:
          ATTIC_ENDPOINT: ${{ vars.FLOE_CACHE_ENDPOINT }}
          ATTIC_CACHE: ${{ vars.FLOE_CACHE_NAME }}
          ATTIC_TOKEN: ${{ secrets.FLOE_CACHE_TOKEN }}
          CACHE_PUBLIC_URL: ${{ vars.FLOE_CACHE_PUBLIC_URL }}
          CACHE_PUBLIC_KEY: ${{ vars.FLOE_CACHE_PUBLIC_KEY }}
        run: |
          nix profile install nixpkgs#attic-client
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          attic login --set-default "$ATTIC_CACHE" "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"
          mkdir -p ~/.config/nix
          {
            echo "extra-substituters = $CACHE_PUBLIC_URL"
            echo "extra-trusted-public-keys = $CACHE_PUBLIC_KEY"
          } >> ~/.config/nix/nix.conf

      - name: Snapshot store
        id: pre
        run: |
          nix path-info --all > "$RUNNER_TEMP/store-before.txt"
          echo "before=$RUNNER_TEMP/store-before.txt" >> "$GITHUB_OUTPUT"

      - name: Compute matrix
        id: matrix
        shell: bash
        env:
          REBUILD_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild_all }}
        run: |
          set -euo pipefail

          if [[ "$REBUILD_ALL" == "true" ]]; then
            matrix=$(nix run .#floe-builder -- list)
          else
            matrix=$(nix run .#floe-builder -- list --outdated)
          fi

          count=$(echo "$matrix" | jq 'length')
          echo "Matrix entries: $count"
          echo "$matrix" | jq

          if [[ "$count" == "0" ]]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi
          # GHA matrix `include` expects an array of objects.
          echo "matrix={\"include\":$matrix}" >> "$GITHUB_OUTPUT"

      - name: Push new store paths to Attic
        if: steps.cache.outputs.have_token == 'true'
        env:
          ATTIC_CACHE: ${{ vars.FLOE_CACHE_NAME }}
          BEFORE: ${{ steps.pre.outputs.before }}
        run: |
          set -euo pipefail
          new=$(comm -23 <(nix path-info --all | sort -u) <(sort -u "$BEFORE"))
          if [[ -z "$new" ]]; then
            echo "No new store paths to push."
            exit 0
          fi
          # shellcheck disable=SC2086
          attic push "$ATTIC_CACHE" $new

  build:
    name: Build ${{ matrix.app }} (${{ matrix.system }})
    needs: setup
    if: needs.setup.outputs.empty == 'false'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: >-
      ${{ matrix.system == 'aarch64-linux' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lix
        uses: canidae-solutions/lix-quick-install-action@main

      - name: Check for cache token
        id: cache
        env:
          CACHE_TOKEN: ${{ secrets.FLOE_CACHE_TOKEN }}
        run: |
          if [[ -n "${CACHE_TOKEN:-}" ]]; then
            echo "have_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Attic
        if: steps.cache.outputs.have_token == 'true'
        env:
          ATTIC_ENDPOINT: ${{ vars.FLOE_CACHE_ENDPOINT }}
          ATTIC_CACHE: ${{ vars.FLOE_CACHE_NAME }}
          ATTIC_TOKEN: ${{ secrets.FLOE_CACHE_TOKEN }}
          CACHE_PUBLIC_URL: ${{ vars.FLOE_CACHE_PUBLIC_URL }}
          CACHE_PUBLIC_KEY: ${{ vars.FLOE_CACHE_PUBLIC_KEY }}
        run: |
          nix profile install nixpkgs#attic-client
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          attic login --set-default "$ATTIC_CACHE" "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"
          mkdir -p ~/.config/nix
          {
            echo "extra-substituters = $CACHE_PUBLIC_URL"
            echo "extra-trusted-public-keys = $CACHE_PUBLIC_KEY"
          } >> ~/.config/nix/nix.conf

      - name: Snapshot store
        id: pre
        run: |
          nix path-info --all > "$RUNNER_TEMP/store-before.txt"
          echo "before=$RUNNER_TEMP/store-before.txt" >> "$GITHUB_OUTPUT"

      - name: Build app
        env:
          FLOE_APPSTREAM_BASE_URL: ${{ vars.FLOE_APPSTREAM_BASE_URL }}
        run: |
          nix run .#floe-builder -- \
            build --app "${{ matrix.app }}" --system "${{ matrix.system }}"

      - name: Push new store paths to Attic
        if: steps.cache.outputs.have_token == 'true'
        env:
          ATTIC_CACHE: ${{ vars.FLOE_CACHE_NAME }}
          BEFORE: ${{ steps.pre.outputs.before }}
        run: |
          set -euo pipefail
          new=$(comm -23 <(nix path-info --all | sort -u) <(sort -u "$BEFORE"))
          if [[ -z "$new" ]]; then
            echo "No new store paths to push."
            exit 0
          fi
          # shellcheck disable=SC2086
          attic push "$ATTIC_CACHE" $new

      - name: Check for AppStream S3 credentials
        id: appstream
        shell: bash
        env:
          S3_KEY_ID: ${{ secrets.FLOE_APPSTREAM_S3_KEY_ID }}
          S3_SECRET: ${{ secrets.FLOE_APPSTREAM_S3_SECRET }}
          S3_ENDPOINT: ${{ vars.FLOE_APPSTREAM_S3_ENDPOINT }}
          S3_BUCKET: ${{ vars.FLOE_APPSTREAM_BUCKET }}
        run: |
          if [[ -n "${S3_KEY_ID:-}" && -n "${S3_SECRET:-}" && -n "${S3_ENDPOINT:-}" && -n "${S3_BUCKET:-}" ]]; then
            echo "have_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload AppStream slice
        if: steps.cache.outputs.have_token == 'true' && steps.appstream.outputs.have_credentials == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.FLOE_APPSTREAM_S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.FLOE_APPSTREAM_S3_SECRET }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          ENDPOINT: ${{ vars.FLOE_APPSTREAM_S3_ENDPOINT }}
          BUCKET: ${{ vars.FLOE_APPSTREAM_BUCKET }}
          SYSTEM: ${{ matrix.system }}
        run: |
          src="var/appstream/${SYSTEM}"
          nix shell nixpkgs#awscli2 -c aws s3 cp \
            --recursive \
            --endpoint-url "$ENDPOINT" \
            "$src/" \
            "s3://${BUCKET}/${SYSTEM}/" \
            --no-progress

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}-${{ matrix.system }}
          path: builds/${{ matrix.app }}/${{ matrix.system }}.json
          if-no-files-found: error
          retention-days: 7

  collect:
    name: Commit builds
    needs:
      - setup
      - build
    # Run even if some matrix entries failed; commit whatever builds succeeded.
    if: ${{ always() && needs.setup.outputs.empty == 'false' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Materialize builds
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          any=0
          for art in artifacts/build-*; do
            # Artifact name is `build-<app>-<sys>`; recover both for placement.
            base="$(basename "$art")"
            rest="${base#build-}"
            sys=""
            for candidate in x86_64-linux aarch64-linux; do
              if [[ "$rest" == *"-$candidate" ]]; then
                sys="$candidate"
                break
              fi
            done
            if [[ -z "$sys" ]]; then
              echo "::warning::cannot infer system from artifact name $base; skipping"
              continue
            fi
            suffix="-$sys"
            app="${rest%"$suffix"}"
            mkdir -p "builds/$app"
            cp "$art/$sys.json" "builds/$app/$sys.json"
            any=1
          done
          if [[ $any -eq 0 ]]; then
            echo "No builds to commit."
          fi

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add builds/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "ci: refresh builds

          Triggered by ${{ github.sha }}."
          # Rebase in case another run pushed in the meantime, then push.
          git pull --rebase origin main
          git push origin main
